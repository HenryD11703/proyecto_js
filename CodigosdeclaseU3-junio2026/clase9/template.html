<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <template id="plantilla-saludo">
        <h1>Saludo de usuario</h1>
        <p class="saludo"></p>
    </template>

    <saludo-camper nombre="Randolh"></saludo-camper>
    <saludo-camper nombre="Juan"></saludo-camper>
    <saludo-camper nombre="Luis"></saludo-camper>

    <script>
        class miComponente extends HTMLElement {
            constructor(){
                super();
            }

            connectedCallback(){
                const plantilla = document.getElementById("plantilla-saludo");
                const clon = plantilla.content.cloneNode(true);

                const nombre = this.getAttribute("nombre");
                clon.querySelector(".saludo").textContent = "Hola soy "+nombre+"!";
                this.appendChild(clon)
            }
        }

        customElements.define("saludo-camper", miComponente);
    </script>
</body>
</html>
