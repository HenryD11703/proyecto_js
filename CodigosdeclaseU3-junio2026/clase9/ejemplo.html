<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <template id="template-task">
        <div class="card">
            <span class="text"></span>
            <button>✔️</button>
        </div>
    </template>


    <to-do text="Hacer el taller"></to-do>
    <to-do text="Estudiar WebComponents"></to-do>
    <to-do text="Barrer"></to-do>
    <to-do text="Ir al super"></to-do>

    <script>
        class TaskItem extends HTMLElement {
            constructor(){
                super();
            }

            connectedCallback(){
                const shadow = this.attachShadow({mode: "open"});

                const template = document.getElementById("template-task");
                const clon = template.content.cloneNode(true);

                const text = this.getAttribute("text");
                clon.querySelector(".text").textContent = text;

                const style = document.createElement("style");
                style.textContent = `
                    .card {
                        border: 1px solid gray;
                        padding: 5px;
                        margin: 10px 0;
                        border-radius: 9px;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                    }

                    button {
                        cursor: pointer;
                    }

                    .done{
                        text-decoration: line-through;
                        color: gray;
                    }
                `;

                const btn = clon.querySelector("button");
                const spanText = clon.querySelector(".text");

                btn.addEventListener("click", ()=>{
                    spanText.classList.toggle("done");
                });

                shadow.append(style, clon);
            }
        }

        customElements.define("to-do", TaskItem);
    </script>
</body>
</html>
