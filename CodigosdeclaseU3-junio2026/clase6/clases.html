<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .contenedor{
            color: red;
        }

        .caja{
            border: 5px solid blue;
        }

        .contenido {
            font-size: 64px;
        }

        .menu {
            background-color: salmon;
        }
    </style>
</head>
<body>
    <div id="contendor-principal" class="contenedor caja contenido menu">
        <h1>Bienvenidos a JS</h1>
    </div>

    <script>
        const contenedor = document.getElementById("contendor-principal")
        console.log(contenedor);
        const clases = contenedor.classList;
        console.log(clases)
        console.log("Cantidad de clases ", clases.length)
        console.log("Primer clase ", clases.item(0))
        console.log("El contenedor tiene la clase menu? ", clases.contains("menu"))
        clases.remove("menu")
        clases.remove("contenido")
        clases.add("menu")
        // Toggle
        clases.replace("menu", "contenido")
    </script>
</body>
</html>
