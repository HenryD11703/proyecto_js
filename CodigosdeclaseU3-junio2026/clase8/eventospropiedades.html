<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 150px;
            height: 150px;
            border: 5px solid black;
        }
    </style>
</head>
<body>
    <button id="rojo">Rojo</button>
    <button id="verde">Verde</button>
    <button id="azul">Azul</button>
    <hr>
    <div id="caja"></div>
    <hr>
    <p id="mensaje"></p>
    <script>
        function imprimir(mensaje){
            document.getElementById("mensaje").textContent = mensaje;
        }

        const caja = document.getElementById("caja");

        const btnRojo = document.getElementById("rojo");
        const btnVerde = document.getElementById("verde");
        const btnAzul = document.getElementById("azul");

        btnRojo.onclick = () => {
            caja.style.background = "red";
        }
        btnVerde.onclick = () => {
            caja.style.background = "green";
        }
        btnAzul.onclick = () => {
            caja.style.background = "blue";
        }

        //btnRojo.onclick = () => {
        //    imprimir("Rojo");
        //}

        caja.onmouseenter = () =>{
            caja.style.width = "200px";
        }

        caja.onmouseleave = () => {
            caja.style.width = "150px"
        }
    </script>
</body>
</html>
