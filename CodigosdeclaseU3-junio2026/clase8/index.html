<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #consola {
            border: 5px solid blueviolet;
            padding: 10px;
            height: 30vh;
        }

        .impresion{
            margin: 4px;
            padding: 4px;
            border-bottom: 1px solid blue;
        }

        .boton{
            margin: 5px;
            background-color: blueviolet;
            color: white;
        }

        .boton:hover {
            cursor: pointer;
            background-color: aqua;
        }

        form {
            border: 2px solid blueviolet;
            padding: 10px;
            margin: 5px;
        }

        .oculto{
            display: none;
        }
    </style>
</head>
<body>
    <h1>Mi pokedex 🐱</h1>
    <div id="consola"></div>
    <button class="boton" id="btn-capturar">Capturar</button>
    <button class="boton" id="btn-mostrar">Mostrar</button>
    <button class="boton" id="btn-buscar">Buscar</button>
    <button class="boton" id="btn-subir">Subir nivel</button>
    <button class="boton" id="btn-liberar">Liberar</button>
    <form id="form-capturar" class="oculto">
        <label for="capturar-nombre">Nombre</label>
        <input type="text" id="capturar-nombre" required>
        <hr>
        <label for="capturar-tipo">Tipo</label>
        <input type="text" id="capturar-tipo" required>
        <hr>
        <label for="capturar-nivel">Nivel</label>
        <input type="number" id="capturar-nivel" required>
        <hr>
        <label for="capturar-estado">Estado</label>
        <input type="text" id="capturar-estado" placeholder="Debilitado o Saludable" required>
        <hr>
        <button class="boton">Capturar</button>
    </form>
    <form id="form-buscar" class="oculto">
        <label for="buscar-nombre">Nombre</label>
        <input type="text" id="buscar-nombre" required>
        <hr>
        <button class="boton">Buscar</button>
    </form>
    <form id="form-subir" class="oculto">
        <label for="subir-nombre">Nombre</label>
        <input type="text" id="subir-nombre" required>
        <hr>
        <button class="boton">Subir Nivel</button>
    </form>
    <form id="form-liberar" class="oculto">
        <label for="liberar-nombre">Nombre</label>
        <input type="text" id="liberar-nombre" required>
        <hr>
        <button class="boton">Liberar</button>
    </form>
    <script src="./ejemploPokemon.js"></script>
</body>
</html>
