<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #productos, #carrito {
            display: flex;
            flex-wrap: wrap;
        }

        .card {
            border: 5px solid black;
            margin: 5px;
            padding: 5px;
            width: 150px;
        }
    </style>
</head>

<body>
    <h2>Tienda</h2>
    <div id="productos"></div>
    <h2>Carrito</h2>
    <div id="carrito"></div>
    <script>
        async function loadProducts() {
            // Ejemplo cabeceras (Alan)
            const headers = new Headers();
            headers.set("X-Api-Key", "kn7DrCOn0rCs3bxhCPDKOzwdpJOHEkeI52De6X9o");
            const options = {
                method: "GET",
                headers: headers
            }
            const url = new URL("https://fakestoreapi.com/products");

            let products = JSON.parse(localStorage.getItem("productos"));

            if (!products){
                const response = await fetch(url, options);
                products = await response.json();
                localStorage.setItem("productos", JSON.stringify(products));
            }

            // Así debería ser
            const contenedorProductos = document.getElementById("productos");
            products.forEach(pro => {
                const div = document.createElement("div");
                div.classList.add("card")
                const titulo  = document.createElement("h3");
                const imagen = document.createElement("img")
                const precio = document.createElement("p")
                const boton = document.createElement("button")
                boton.innerText = "Agregar al carrito"
                titulo.textContent = pro.title;
                imagen.setAttribute("src", pro.image)
                imagen.setAttribute("width", "80px")
                precio.textContent = "$"+pro.price;

                div.appendChild(titulo);
                div.appendChild(imagen);
                div.appendChild(precio);
                div.appendChild(boton)

                boton.addEventListener("click", ()=>{
                    agregarCarrito(pro)
                });               

                contenedorProductos.appendChild(div);
            })
        };

        function agregarCarrito(producto){
            let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            carrito.push(producto);
            localStorage.setItem("carrito", JSON.stringify(carrito));
            pintarCarrito();
        }

        // Así no debería ser 🤪
        function pintarCarrito(){
            let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
            const contenedorCarrito = document.getElementById("carrito");
            contenedorCarrito.replaceChildren();
            carrito.forEach(pro => {
                    contenedorCarrito.innerHTML += `
                        <div class="card">
                            <h3>${pro.title}</h3>
                            <img src="${pro.image}" width="80px">
                            <p>$${pro.price}</p>
                        </div>
                    `
            })
        }

        loadProducts();
        pintarCarrito();

    </script>
</body>

</html>
